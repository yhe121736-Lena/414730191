<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔法手勢：星空大冒險 2.0</title>
  
  <!-- 載入 p5.js 核心庫 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <!-- 載入 ml5.js (使用穩定支援 handpose 的版本) -->
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #0a0a1a; /* 更深邃的宇宙背景 */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      box-shadow: 0 0 30px rgba(100, 200, 255, 0.3);
      border-radius: 12px;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
    .loading-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      font-weight: bold;
      color: #00ffcc;
      text-shadow: 0 0 10px #00ffcc;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <div id="loading" class="loading-text">📷 系統啟動中...</div>
  </div>

  <script>
    // ==========================================
    // 遊戲核心變數
    // ==========================================
    let video;
    let handpose;
    let predictions = [];
    
    // 遊戲狀態：0=載入中, 1=開始畫面, 2=遊戲中, 3=遊戲結束
    let gameState = 0; 
    let score = 0;
    let lives = 3;
    let level = 1;
    
    // --- 2.0 新增機制變數 ---
    let combo = 0;
    let comboTimer = 0; // 連擊計時器
    const COMBO_TIME_LIMIT = 60; // 連擊有效時間 (幀數)

    let shieldActive = false;
    let shieldTimer = 0;
    const SHIELD_DURATION = 300; // 護盾持續 5 秒 (60fps * 5)
    
    let levelUpMessageTimer = 0; // 升級訊息顯示計時
    
    // 手指游標位置
    let cursorX = 320;
    let cursorY = 240;
    let targetX = 320;
    let targetY = 240;
    // 游標拖尾陣列
    let trail = [];
    
    // 遊戲物件與粒子
    let items = [];
    let particles = [];
    
    // ==========================================
    // p5.js 初始化
    // ==========================================
    function setup() {
      let canvas = createCanvas(640, 480);
      canvas.parent('game-container');
      textAlign(CENTER, CENTER);
      
      video = createCapture(VIDEO);
      video.size(width, height);
      video.hide();
      
      // 設定手部偵測模型參數，提高偵測信心門檻以減少抖動
      const options = {
        flipHorizontal: true, // 模型直接翻轉，後續座標不用手動 width - x
        detectionConfidence: 0.8,
        iouThreshold: 0.5,
        scoreThreshold: 0.5
      };
      handpose = ml5.handpose(video, options, modelReady);
      
      handpose.on('predict', results => {
        predictions = results;
      });
    }
    
    function modelReady() {
      console.log('Handpose 模型就緒');
      document.getElementById('loading').style.display = 'none';
      gameState = 1;
    }

    // ==========================================
    // 主迴圈 (每一幀執行)
    // ==========================================
    function draw() {
      // 繪製背景 (半透明遮罩的攝影機畫面)
      push();
      // 因為模型設定了 flipHorizontal: true，這裡不需要再 scale(-1, 1)
      image(video, 0, 0, width, height);
      fill(10, 10, 30, 180); // 深藍色遮罩增強宇宙感
      rect(0, 0, width, height);
      pop();

      // 更新手部追蹤與游標
      updateCursorPosition();

      // 狀態機
      if (gameState === 1) {
        drawStartScreen();
      } else if (gameState === 2) {
        playGame();
      } else if (gameState === 3) {
        drawGameOverScreen();
      }
    }

    // ==========================================
    // 遊戲邏輯更新區
    // ==========================================
    
    function updateCursorPosition() {
       if (predictions.length > 0) {
        // 取得食指指尖 (Index Finger Tip, ID: 8)
        let indexTip = predictions[0].landmarks[8]; 
        // 模型已翻轉，直接使用座標
        targetX = indexTip[0]; 
        targetY = indexTip[1];
      }
      // 平滑移動
      cursorX = lerp(cursorX, targetX, 0.25);
      cursorY = lerp(cursorY, targetY, 0.25);
      
      // 更新拖尾
      trail.push({x: cursorX, y: cursorY});
      if (trail.length > 15) trail.shift();
    }

    function playGame() {
      updateGameMechanics();
      spawnItems();
      updateAndDrawItems();
      drawUI();
      drawCursor(cursorX, cursorY);
      updateParticles();

      if (lives <= 0) {
        gameState = 3;
        createParticles(width/2, height/2, '#FF0000', 50); // 遊戲結束大爆炸
      }
    }
    
    // 更新各種計時器與機制狀態
    function updateGameMechanics() {
        // 關卡升級機制：每 30 分升一級
        let newLevel = floor(score / 30) + 1;
        if (newLevel > level) {
            level = newLevel;
            levelUpMessageTimer = 120; // 顯示 2 秒升級訊息
            createParticles(width/2, height/2, '#00FFFF', 30); // 升級特效
        }
        if (levelUpMessageTimer > 0) levelUpMessageTimer--;

        // 連擊計時器遞減
        if (comboTimer > 0) {
            comboTimer--;
        } else if (combo > 0) {
            combo = 0; // 時間到，連擊中斷
        }

        // 護盾計時器遞減
        if (shieldActive) {
            shieldTimer--;
            if (shieldTimer <= 0) shieldActive = false;
        }
    }

    // 產生掉落物 (根據關卡調整難度與種類)
    function spawnItems() {
      // 關卡越高，產生頻率越高 (最低每 20 幀產生一個)
      let spawnRate = max(20, 50 - (level - 1) * 5);
      
      if (frameCount % spawnRate === 0) {
        let r = random(1);
        let type, color, size, speedBase;

        // 決定掉落物種類與機率
        if (r < 0.05) { 
            type = 'heart'; color = '#FF69B4'; size = 45; speedBase = 4; // 5% 愛心
        } else if (r < 0.1) {
            type = 'shield'; color = '#00BFFF'; size = 45; speedBase = 4; // 5% 護盾
        } else if (r < 0.4 + (level * 0.05)) { // 隨關卡增加炸彈機率
            type = 'bomb'; color = '#FF3333'; size = 40; speedBase = 5 + level;
        } else {
            type = 'star'; color = '#FFD700'; size = 35; speedBase = 3 + level * 0.5;
        }

        items.push({
          x: random(50, width - 50),
          y: -50,
          type: type,
          speed: random(speedBase, speedBase + 2),
          size: size,
          color: color
        });
      }
    }

    // 更新並繪製所有掉落物
    function updateAndDrawItems() {
      for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        item.y += item.speed;
        
        // 繪製 (使用 emoji)
        let displayChar = '';
        if (item.type === 'star') displayChar = '⭐';
        else if (item.type === 'bomb') displayChar = '💣';
        else if (item.type === 'heart') displayChar = '💖';
        else if (item.type === 'shield') displayChar = '🛡️';
        
        textSize(item.size);
        text(displayChar, item.x, item.y);
        
        // --- 碰撞偵測核心邏輯 ---
        let d = dist(cursorX, cursorY, item.x, item.y);
        if (d < item.size) {
          handleCollision(item);
          items.splice(i, 1); // 移除物品
          continue;
        }
        
        // 掉出畫面
        if (item.y > height + 50) {
          items.splice(i, 1);
          if (item.type === 'star') {
              combo = 0; // 漏接星星，連擊中斷
          }
        }
      }
    }

    // 處理碰撞事件
    function handleCollision(item) {
        if (item.type === 'star') {
            combo++;
            comboTimer = COMBO_TIME_LIMIT;
            // 分數計算：基礎分 * (1 + 連擊加成)
            let pointsAdded = 1 * (combo > 5 ? 2 : 1); 
            score += pointsAdded;
            createParticles(item.x, item.y, item.color);
        } 
        else if (item.type === 'bomb') {
            if (shieldActive) {
                // 有護盾，彈開特效
                createParticles(item.x, item.y, '#00BFFF', 20);
                background(0, 200, 255, 50); // 藍色閃光
            } else {
                // 沒護盾，扣血
                lives--;
                combo = 0; // 連擊中斷
                createParticles(item.x, item.y, item.color, 30);
                background(255, 0, 0, 100); // 紅色震動閃光
            }
        } 
        else if (item.type === 'heart') {
            lives = min(lives + 1, 5); // 生命上限為 5
            createParticles(item.x, item.y, item.color, 25);
        }
        else if (item.type === 'shield') {
            shieldActive = true;
            shieldTimer = SHIELD_DURATION;
            createParticles(item.x, item.y, item.color, 25);
        }
    }

    // ==========================================
    // 畫面繪製區 (UI, 游標, 粒子)
    // ==========================================

    function drawCursor(x, y) {
      push();
      translate(x, y);
      
      // 繪製拖尾
      noStroke();
      for (let i = 0; i < trail.length; i++) {
          let pos = trail[i];
          let size = map(i, 0, trail.length, 5, 30);
          let alpha = map(i, 0, trail.length, 0, 150);
          // 如果有護盾，拖尾變藍色，否則為金色
          fill(shieldActive ? 0 : 255, shieldActive ? 200 : 215, shieldActive ? 255 : 0, alpha);
          ellipse(pos.x - x, pos.y - y, size, size);
      }

      // 繪製主體光環
      rotate(frameCount * 0.08);
      noFill();
      strokeWeight(shieldActive ? 6 : 4);
      // 護盾狀態下光環變藍色且更大
      stroke(shieldActive ? 0 : 255, shieldActive ? 200 : 215, shieldActive ? 255 : 0, 200); 
      ellipse(0, 0, shieldActive ? 70 : 50, shieldActive ? 70 : 50);
      
      // 內部核心
      rotate(-frameCount * 0.04);
      strokeWeight(2);
      rectMode(CENTER);
      rect(0, 0, 25, 25);
      
      pop();
    }

    function drawUI() {
      textAlign(LEFT, TOP);
      textSize(24);
      
      // 分數與關卡
      fill(255, 215, 0);
      text(`分數: ${score}`, 20, 20);
      textSize(18);
      fill(0, 255, 255);
      text(`LEVEL ${level}`, 20, 50);
      
      // 生命值
      let hearts = "❤️".repeat(lives);
      textSize(24);
      text(`${hearts}`, 20, 80);
      
      // 連擊顯示
      if (combo > 1) {
          textAlign(CENTER, TOP);
          textSize(32);
          fill(255, 100, 50);
          // 文字跳動效果
          let bounce = sin(frameCount * 0.2) * 5;
          text(`${combo} COMBO!`, width / 2, 20 + bounce);
          // 連擊計時條
          noStroke();
          fill(255, 100, 50, 150);
          rectMode(CORNER);
          rect(width/2 - 50, 60, map(comboTimer, 0, COMBO_TIME_LIMIT, 100, 0), 10);
      }

      // 護盾剩餘時間條
      if (shieldActive) {
          rectMode(CORNER);
          noStroke();
          fill(0, 200, 255, 150);
          rect(20, 120, map(shieldTimer, 0, SHIELD_DURATION, 150, 0), 15);
          fill(255);
          textSize(14);
          textAlign(LEFT, CENTER);
          text("SHIELD", 25, 127);
      }
      
      // 升級訊息
      if (levelUpMessageTimer > 0) {
          textAlign(CENTER, CENTER);
          textSize(64);
          fill(0, 255, 255, map(levelUpMessageTimer, 0, 120, 0, 255));
          text("LEVEL UP!", width/2, height/2 - 50);
      }

      textAlign(CENTER, CENTER); // Reset
    }

    function drawStartScreen() {
      fill(255);
      textSize(42);
      text("🚀 星空大冒險 2.0 🚀", width / 2, height / 2 - 80);
      
      textSize(18);
      fill(200, 255, 255);
      text("用食指控制光環", width / 2, height / 2 - 20);
      text("⭐接星得點 | 💣避開炸彈", width / 2, height / 2 + 10);
      fill(255, 100, 100);
      text("💖補血 | 🛡️護盾無敵", width / 2, height / 2 + 40);
      
      fill(0, 255, 204, map(sin(frameCount * 0.1), -1, 1, 150, 255));
      textSize(24);
      text("將食指移到這裡開始", width / 2, height / 2 + 130);
      
      drawCursor(cursorX, cursorY);
      
      if (dist(cursorX, cursorY, width / 2, height / 2 + 130) < 50) {
        resetGame();
        gameState = 2;
      }
    }

    function drawGameOverScreen() {
      fill(20, 0, 0, 200);
      rect(0, 0, width, height);
      
      fill(255, 50, 50);
      textSize(56);
      text("GAME OVER", width / 2, height / 2 - 60);
      fill(255);
      textSize(28);
      text(`最終分數: ${score}`, width / 2, height / 2);
      textSize(20);
      fill(0, 255, 255);
      text(`抵達關卡: ${level}`, width / 2, height / 2 + 40);
      
      fill(0, 255, 204, map(sin(frameCount * 0.1), -1, 1, 150, 255));
      text("移動到這裡重新挑戰", width / 2, height / 2 + 120);
      
      drawCursor(cursorX, cursorY);
      
      if (dist(cursorX, cursorY, width / 2, height / 2 + 120) < 50) {
        resetGame();
        gameState = 2;
      }
    }

    // ==========================================
    // 工具函式
    // ==========================================
    function resetGame() {
      score = 0; lives = 3; level = 1;
      combo = 0; comboTimer = 0;
      shieldActive = false; shieldTimer = 0;
      items = []; particles = []; trail = [];
    }

    function createParticles(px, py, pcolor, count = 15) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x: px, y: py,
          vx: random(-5, 5), vy: random(-5, 5),
          life: 255,
          color: pcolor,
          size: random(4, 12)
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.life -= 8;
        noStroke();
        let c = color(p.color);
        c.setAlpha(p.life);
        fill(c);
        circle(p.x, p.y, p.size * (p.life/255));
        if (p.life <= 0) particles.splice(i, 1);
      }
    }
  </script>
</body>
</html>
