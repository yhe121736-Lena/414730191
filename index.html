<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔法手勢：星空大冒險 5.2 (音樂系統版)</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: white;
      overflow: hidden;
      position: relative;
    }

    /* 框框外背景星塵旋轉特效 */
    body::before {
      content: "";
      position: absolute;
      width: 300%;
      height: 300%;
      background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
      opacity: 0.15;
      animation: rotateBg 240s linear infinite;
      z-index: 0;
    }

    @keyframes rotateBg {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 背景環境光暈 */
    .glow-corner {
      position: absolute;
      width: 60vw;
      height: 60vh;
      background: radial-gradient(circle, rgba(0, 255, 204, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
      filter: blur(80px);
      z-index: 1;
      pointer-events: none;
    }
    .top-left { top: -10%; left: -10%; }
    .bottom-right { bottom: -10%; right: -10%; }

    #game-container {
      position: relative;
      box-shadow: 0 0 100px rgba(0, 255, 204, 0.2), inset 0 0 30px rgba(0, 255, 204, 0.1);
      border: 1px solid rgba(0, 255, 204, 0.3);
      border-radius: 15px;
      overflow: hidden;
      background-color: #000;
      z-index: 10;
    }
    canvas { display: block; }
    
    .loading-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      font-weight: bold;
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      pointer-events: none;
      z-index: 10;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    /* 新增：音樂控制面板 UI */
    .music-controls {
      position: absolute;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 12px;
      z-index: 20; /* 確保按鈕在畫面的最上層 */
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #00ffcc;
      backdrop-filter: blur(5px);
    }
    .music-btn {
      background: transparent;
      border: none;
      color: #00ffcc;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }
    .music-btn:hover {
      color: #fff;
      transform: scale(1.2);
      text-shadow: 0 0 10px #00ffcc;
    }
  </style>
</head>
<body>
  <div class="glow-corner top-left"></div>
  <div class="glow-corner bottom-right"></div>

  <div id="game-container">
    <div id="loading" class="loading-text">📷 啟動高精度模型中...</div>
    
    <div class="music-controls">
      <button class="music-btn" onclick="prevSong()" title="上一首">⏮</button>
      <button class="music-btn" onclick="togglePlay()" id="playPauseBtn" title="播放/暫停">▶</button>
      <button class="music-btn" onclick="nextSong()" title="下一首">⏭</button>
    </div>
  </div>

  <script>
    // ==========================================
    // 音樂系統變數與功能
    // ==========================================
    let playlist = [
      'music/song1.mp3', // 請確保資料夾名稱與檔名正確
      'music/song2.mp3',
      'music/song3.mp3'
    ];
    let currentSongIndex = 0;
    let bgm = new Audio(playlist[currentSongIndex]);
    let isPlaying = false;

    // 播完一首歌後自動切換下一首
    bgm.addEventListener('ended', nextSong);

    function togglePlay() {
      let btn = document.getElementById('playPauseBtn');
      if (isPlaying) {
        bgm.pause();
        btn.innerText = '▶';
      } else {
        bgm.play().catch(e => console.log("請先與網頁互動後才能播放音樂！"));
        btn.innerText = '⏸';
      }
      isPlaying = !isPlaying;
    }

    function nextSong() {
      currentSongIndex = (currentSongIndex + 1) % playlist.length;
      changeSong();
    }

    function prevSong() {
      currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
      changeSong();
    }

    function changeSong(index) {
      if (index !== undefined) currentSongIndex = index;
      bgm.pause();
      bgm.src = playlist[currentSongIndex];
      if (isPlaying || index !== undefined) {
        if (index !== undefined) isPlaying = true;
        document.getElementById('playPauseBtn').innerText = '⏸';
        bgm.play().catch(e => console.log("BGM Error: 需要先與頁面互動"));
      }
    }


    // ==========================================
    // 遊戲核心變數
    // ==========================================
    let video;
    let handpose;
    let predictions = [];
    
    let gameState = 0; 
    let score = 0;
    let lives = 3;
    let level = 1;
    let gameTimer = 0; 
    
    let combo = 0;
    let comboTimer = 0; 
    const COMBO_TIME_LIMIT = 90; 

    let shieldActive = false;
    let shieldTimer = 0;
    const SHIELD_DURATION = 300; 
    
    let hoverMenu1 = 0;
    let hoverMenu2 = 0;
    
    let screenShakeTime = 0;
    let glitchEffectTime = 0;
    let winParticles = []; 
    let invincibleTimer = 0; 
    
    let cursorX = 320;
    let cursorY = 240;
    let targetX = 320;
    let targetY = 240;
    let cursorTrailParticles = []; 

    let isHandOpen = false; 
    let isFist = false;     
    let chargeLevel = 0;    
    let bossItem = null;    
    let challengeMode = false; 
    
    let items = [];
    let particles = [];
    let backgroundStars = [];
    
    // ==========================================
    // 初始化
    // ==========================================
    function setup() {
      let canvas = createCanvas(640, 480);
      canvas.parent('game-container');
      textAlign(CENTER, CENTER);
      
      video = createCapture(VIDEO);
      video.size(width, height);
      video.hide();
      
      const options = {
        flipHorizontal: false, 
        detectionConfidence: 0.85, 
        iouThreshold: 0.5,
        scoreThreshold: 0.85
      };
      handpose = ml5.handpose(video, options, modelReady);
      
      handpose.on('predict', results => {
        predictions = results;
      });

      for(let i=0; i<50; i++) {
        backgroundStars.push({
          x: random(width), y: random(height),
          size: random(1, 3), speed: random(0.2, 1)
        });
      }
    }
    
    function modelReady() {
      console.log('Handpose 模型就緒');
      document.getElementById('loading').style.display = 'none';
      gameState = 1;
    }

    // ==========================================
    // 主迴圈
    // ==========================================
    function draw() {
      let dx = 0, dy = 0;
      if (screenShakeTime > 0) {
        dx = random(-15, 15), dy = random(-15, 15);
        screenShakeTime--;
      }
      
      push();
      translate(dx, dy); 

      push();
      translate(width, 0);
      scale(-1, 1);
      image(video, 0, 0, width, height);
      pop();
      
      let bgColor = (gameState === 3) ? color(20, 5, 20, 200) : color(5, 5, 20, 190);
      if (challengeMode) bgColor = color(30, 5, 5, 190);
      fill(bgColor); 
      rect(0, 0, width, height);
      drawBackgroundStars();

      updateHandTracking();

      if (gameState === 1) drawMenuScreen();
      else if (gameState === 2) playGame1();
      else if (gameState === 3) playGame2();
      else if (gameState === 4) drawGameOverScreen();
      else if (gameState === 5) drawWinScreen();
      
      if (glitchEffectTime > 0) {
        drawGlitchEffect();
        glitchEffectTime--;
      }

      pop(); 
    }

    function drawBackgroundStars() {
      fill(255, 255, 255, 150);
      noStroke();
      for(let star of backgroundStars) {
        star.y += star.speed + (level * 0.2) + (challengeMode ? 2 : 0) + (gameState===3 ? 3 : 0); 
        if(star.y > height) {
          star.y = 0;
          star.x = random(width);
        }
        circle(star.x, star.y, star.size);
      }
    }

    // ==========================================
    // 手部辨識核心
    // ==========================================
    function updateHandTracking() {
       isHandOpen = false; 
       isFist = false;

       if (predictions.length > 0) {
        let lm = predictions[0].landmarks; 
        
        let minX = width, maxX = 0, minY = height, maxY = 0;
        for(let i=0; i<lm.length; i++) {
            if(lm[i][0] < minX) minX = lm[i][0];
            if(lm[i][0] > maxX) maxX = lm[i][0];
            if(lm[i][1] < minY) minY = lm[i][1];
            if(lm[i][1] > maxY) maxY = lm[i][1];
        }
        // 使用中指根部(9)作為手掌中心，移動更穩定，避免握拳時游標大幅跳動
        let centerX = lm[9][0];
        let centerY = lm[9][1];
        targetX = width - centerX; 
        targetY = centerY;

        let handSize = dist(minX, minY, maxX, maxY); 
        let tips = [8, 12, 16, 20]; 
        let totalDist = 0;
        for(let id of tips) {
            totalDist += dist(lm[0][0], lm[0][1], lm[id][0], lm[id][1]);
        }
        let avgDist = totalDist / 4;
        let gestureRatio = avgDist / handSize; 

        if (gestureRatio > 0.6) isHandOpen = true; // 稍微放寬判定
        if (gestureRatio < 0.54) isFist = true;   // 讓握拳更容易觸發
      }
      
      cursorX = lerp(cursorX, targetX, 0.3); // 提升反應速度
      cursorY = lerp(cursorY, targetY, 0.3);
      
      if (frameCount % 2 === 0 && (gameState === 1 || gameState === 2 || gameState === 3)) {
        let pColor = isFist ? color(255, 50, 50) : (isHandOpen ? color(255, 215, 0) : color(0, 255, 204));
        cursorTrailParticles.push({
          x: cursorX + random(-15, 15), y: cursorY + random(-15, 15),
          life: 255, size: isHandOpen || isFist ? random(8, 18) : random(5, 12),
          c: pColor
        });
      }
    }

    // ==========================================
    // 選單畫面
    // ==========================================
    function drawMenuScreen() {
      fill(255); textSize(40);
      text("🚀 星空大冒險 5.2 🚀", width / 2, 80);
      textSize(20); fill(200, 255, 255);
      text("將手掌移動到選項上維持 2 秒以開始", width / 2, 130);

      drawMenuOption(160, 280, "⭐ 星空大冒險", "收集星星\n張手打BOSS", '#00BFFF', hoverMenu1);
      drawMenuOption(480, 280, "☄️ 隕石粉碎者", "生存30秒\n握拳擊碎隕石", '#FF4500', hoverMenu2);

      if (dist(cursorX, cursorY, 160, 280) < 80) hoverMenu1 += 2; else hoverMenu1 = max(0, hoverMenu1 - 2);
      if (dist(cursorX, cursorY, 480, 280) < 80) hoverMenu2 += 2; else hoverMenu2 = max(0, hoverMenu2 - 2);

      if (hoverMenu1 > 100) { resetGame(); gameState = 2; changeSong(0); } // 第一款遊戲用 song1
      if (hoverMenu2 > 100) { resetGame(); gameTimer = 30 * 60; gameState = 3; changeSong(1); } // 第二款用 song2

      updateAndDrawTrail(); 
      drawCursor(cursorX, cursorY);
    }

    function drawMenuOption(x, y, title, desc, col, hoverVal) {
      push(); translate(x, y);
      fill(0, 0, 0, 150); stroke(col); strokeWeight(hoverVal > 0 ? 4 : 2);
      rectMode(CENTER); rect(0, 0, 220, 150, 15);
      
      noStroke(); fill(255); textSize(24); text(title, 0, -30);
      textSize(16); fill(200); text(desc, 0, 15);
      
      if (hoverVal > 0) {
        fill(50); rect(0, 55, 180, 10, 5);
        fill(col); rect(-90 + (hoverVal*0.9), 55, hoverVal * 1.8, 10, 5);
      }
      pop();
    }

    // ==========================================
    // 遊戲模式一：星空大冒險
    // ==========================================
    function playGame1() {
      updateGameMechanics();
      
      if (challengeMode) updateChallengeMode();
      else { spawnItems(); updateAndDrawItems(); }
      
      updateAndDrawTrail(); 
      drawCursor(cursorX, cursorY);
      updateParticles();
      drawUI();

      if (lives <= 0) triggerGameOver();
    }

    // ==========================================
    // 遊戲模式二：隕石粉碎者
    // ==========================================
    function playGame2() {
      if (gameTimer > 0) gameTimer--;
      if (gameTimer <= 0) triggerWin(); 

      if (invincibleTimer > 0) invincibleTimer--;

      // 更新連擊計時器
      if (comboTimer > 0) comboTimer--; else if (combo > 0) combo = 0;

      if (frameCount % 30 === 0) {
        items.push({
          x: random(50, width - 50), y: -50, type: 'meteor',
          speed: random(4, 8), size: random(50, 80), color: '#A0522D',
          rotation: random(TWO_PI), rotSpeed: random(-0.1, 0.1)
        });
      }

      for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        item.y += item.speed; item.rotation += item.rotSpeed;
        push(); translate(item.x, item.y); rotate(item.rotation);
        textSize(item.size); text("🪨", 0, 0); pop();
        
        let hitDist = item.size / 2 + 15; // 稍微加大判定範圍，手感更好
        if (dist(cursorX, cursorY, item.x, item.y) < hitDist) {
          if (isFist) {
            // 成功擊碎：獲得連擊分數與特效
            combo++;
            comboTimer = COMBO_TIME_LIMIT;
            createBurstParticles(item.x, item.y, '#FFD700', 30);
            score += 10 * (combo > 1 ? 2 : 1); // 連擊加倍
            screenShakeTime = 5; 
          } else if (invincibleTimer <= 0) {
            // 未握拳且無無敵狀態：扣愛心並中斷連擊
            lives--;
            invincibleTimer = 50; 
            combo = 0; comboTimer = 0;
            createBurstParticles(item.x, item.y, '#FF0000', 50);
            screenShakeTime = 15;
            glitchEffectTime = 10;
          }
          items.splice(i, 1);
          continue;
        }
        if (item.y > height + 50) {
          items.splice(i, 1);
          combo = 0; comboTimer = 0; // 漏掉隕石也中斷連擊
        }
      }

      updateAndDrawTrail(); 
      drawCursor(cursorX, cursorY);
      updateParticles();

      textAlign(LEFT, TOP); fill(0, 0, 0, 150); rect(10, 10, 160, 80, 10);
      fill(255, 100, 100); textSize(24); text(`TIME: ${ceil(gameTimer/60)}`, 20, 15);
      let hearts = "❤️".repeat(lives); textSize(22); text(`${hearts}`, 20, 50);
      
      textAlign(CENTER, TOP); textSize(24);
      if (isFist) { fill(0, 255, 0); text("🔥 粉碎模式 ON 🔥", width/2, 20); }
      else if (invincibleTimer > 0) { fill(0, 255, 255); text("🛡️ 無敵狀態中 🛡️", width/2, 20); }
      else { fill(255, 100, 100); text("⚠️ 握拳擊碎隕石！", width/2, 20); }

      // 繪製連擊 UI
      if (combo > 1) {
          textAlign(CENTER, TOP); textSize(40);
          let comboColor = combo > 5 ? color(255, 50, 50) : color(255, 150, 0);
          fill(comboColor);
          let bounce = sin(frameCount * 0.3) * (combo * 0.5);
          text(`${combo} COMBO!`, width / 2, 70 + bounce);
          noStroke(); fill(comboColor.levels[0], comboColor.levels[1], comboColor.levels[2], 150);
          rectMode(CENTER); rect(width/2, 120, map(comboTimer, 0, COMBO_TIME_LIMIT, 200, 0), 8, 4); rectMode(CORNER);
      }

      if (lives <= 0) triggerGameOver();
    }

    // ==========================================
    // 遊戲機制與 Boss 邏輯
    // ==========================================
    function updateGameMechanics() {
        let newLevel = floor(score / 50) + 1;
        if (newLevel > level) {
            level = newLevel;
            createBurstParticles(width/2, height/2, '#00FFFF', 50); 
        }

        if (score > 0 && score % 50 === 0 && !bossItem && !challengeMode) {
            challengeMode = true; chargeLevel = 0; items = [];
            bossItem = { x: width / 2, y: -100, size: 150, hp: 100, speed: 0.5 + (level * 0.1) };
            screenShakeTime = 20;
        }

        if (comboTimer > 0) comboTimer--; else if (combo > 0) combo = 0; 
        if (shieldActive) {
            shieldTimer--;
            if (shieldTimer <= 0) shieldActive = false;
        }
    }

    function updateChallengeMode() {
        if (!bossItem) return;
        bossItem.y += bossItem.speed;
        
        push(); translate(bossItem.x, bossItem.y); rotate(frameCount * 0.02);
        textSize(bossItem.size); text("☄️", 0, 0);
        noStroke(); fill(255, 0, 0, 150); rect(-50, 80, 100, 10);
        fill(0, 255, 0); rect(-50, 80, bossItem.hp, 10); pop();

        if (isHandOpen) {
            chargeLevel = min(chargeLevel + 2, 100); 
            createBurstParticles(cursorX, cursorY, '#FFD700', 2);
            if (frameCount % 5 === 0) screenShakeTime = 2; 
        } else {
            chargeLevel = max(chargeLevel - 1, 0); 
        }

        if (chargeLevel > 0) {
            push(); translate(cursorX, cursorY + 80);
            noStroke(); fill(50, 50, 50, 150); rect(-60, 0, 120, 20, 10);
            fill(chargeLevel === 100 ? color(0, 255, 255) : color(255, 215, 0));
            rect(-60, 0, map(chargeLevel, 0, 100, 0, 120), 20, 10);
            fill(255); textSize(14);
            text(chargeLevel === 100 ? "能量釋放!" : "張開手掌集氣!", 0, 0); pop();
        }

        if (chargeLevel === 100) {
            createBurstParticles(cursorX, cursorY, '#00FFFF', 50); 
            chargeLevel = 0; bossItem.hp -= 34; screenShakeTime = 15;
            if (bossItem.hp <= 0) {
                createBurstParticles(bossItem.x, bossItem.y, '#FF4500', 150);
                triggerWin(); 
            }
        }

        if (bossItem.y > height + bossItem.size/2) {
            lives--; bossItem = null; challengeMode = false;
            screenShakeTime = 30; glitchEffectTime = 20;
            createBurstParticles(width/2, height, '#FF0000', 100);
        }
    }

    function spawnItems() {
      let spawnRate = max(15, 45 - (level - 1) * 4);
      if (frameCount % spawnRate === 0) {
        let r = random(1);
        let type, color, size, speedBase;
        if (r < 0.04) { type = 'heart'; color = '#FF69B4'; size = 45; speedBase = 4; } 
        else if (r < 0.08) { type = 'shield'; color = '#00BFFF'; size = 45; speedBase = 4; } 
        else if (r < 0.35 + (level * 0.05)) { type = 'bomb'; color = '#FF3333'; size = 45; speedBase = 5 + level * 0.8; } 
        else { type = 'star'; color = '#FFD700'; size = 40; speedBase = 3 + level * 0.6; }
        items.push({
          x: random(50, width - 50), y: -50, type: type,
          speed: random(speedBase, speedBase + 3), size: size, color: color,
          rotation: random(TWO_PI), rotSpeed: random(-0.1, 0.1)
        });
      }
    }

    function updateAndDrawItems() {
      for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        item.y += item.speed; item.rotation += item.rotSpeed;
        push(); translate(item.x, item.y); rotate(item.rotation);
        let displayChar = item.type === 'star' ? '⭐' : item.type === 'bomb' ? '💣' : item.type === 'heart' ? '💖' : '🛡️';
        textSize(item.size); text(displayChar, 0, 0); pop();
        
        let hitDist = shieldActive && item.type === 'bomb' ? 60 : 40;
        if (dist(cursorX, cursorY, item.x, item.y) < hitDist) {
          handleCollision(item); items.splice(i, 1); continue;
        }
        if (item.y > height + 50) {
          items.splice(i, 1); if (item.type === 'star') combo = 0; 
        }
      }
    }

    function handleCollision(item) {
        if (item.type === 'star') {
            combo++; comboTimer = COMBO_TIME_LIMIT;
            if (combo % 5 === 0) { createBurstParticles(item.x, item.y, '#FFD700', 40); score += 5; } 
            else { createBurstParticles(item.x, item.y, item.color, 15); }
            score += 1 * (combo > 5 ? 2 : 1); 
        } else if (item.type === 'bomb') {
            if (shieldActive) { createBurstParticles(item.x, item.y, '#00BFFF', 30); score += 2; } 
            else { lives--; combo = 0; createBurstParticles(item.x, item.y, '#FF0000', 50); screenShakeTime = 15; glitchEffectTime = 10; }
        } else if (item.type === 'heart') {
            lives = min(lives + 1, 5); createBurstParticles(item.x, item.y, item.color, 30);
        } else if (item.type === 'shield') {
            shieldActive = true; shieldTimer = SHIELD_DURATION; createBurstParticles(item.x, item.y, item.color, 30);
        }
    }

    // ==========================================
    // 特效與 UI 繪製
    // ==========================================
    function updateAndDrawTrail() {
      noStroke();
      for (let i = cursorTrailParticles.length - 1; i >= 0; i--) {
        let p = cursorTrailParticles[i];
        p.life -= 15; p.size *= 0.9;
        let c = color(p.c); c.setAlpha(p.life); fill(c);
        circle(p.x, p.y, p.size);
        if (p.life <= 0) cursorTrailParticles.splice(i, 1);
      }
    }

    function drawCursor(x, y) {
      push(); translate(x, y);
      
      let baseColor = shieldActive ? color(0, 200, 255) : color(0, 255, 204);
      if (isHandOpen) baseColor = color(255, 215, 0);
      if (isFist) baseColor = color(255, 50, 50);

      let outerSize = isHandOpen ? 120 : (isFist ? 50 : (shieldActive ? 90 : 70));
      
      rotate(frameCount * 0.1);
      noFill(); strokeWeight(isHandOpen || isFist ? 5 : 3); stroke(baseColor);
      if (!isHandOpen && !isFist) drawingContext.setLineDash([10, 15]); 
      ellipse(0, 0, outerSize, outerSize);
      drawingContext.setLineDash([]); 

      rotate(-frameCount * 0.2);
      strokeWeight(2); stroke(baseColor.levels[0], baseColor.levels[1], baseColor.levels[2], 150);
      let innerSize = outerSize * 0.6;
      rectMode(CENTER);
      if (isFist) { fill(255, 50, 50, 150); circle(0, 0, innerSize); } 
      else { rect(0, 0, innerSize, innerSize); }
      
      noStroke(); fill(255); circle(0, 0, 12);
      if (isHandOpen) { fill(255, 215, 0, 100); circle(0, 0, 30); }
      if (isFist) { fill(255, 50, 50, 200); circle(0, 0, 20); }
      
      pop();
    }

    function drawUI() {
      textAlign(LEFT, TOP); fill(0, 0, 0, 150); rect(10, 10, 160, 80, 10); 
      fill(255, 215, 0); textSize(24); text(`SCORE: ${score}`, 20, 15);
      textSize(18); fill(0, 255, 255); text(`LEVEL ${level}`, 20, 45);
      let hearts = "❤️".repeat(lives); textSize(22); text(`${hearts}`, 20, 90);
      
      if (challengeMode) {
          textAlign(CENTER, TOP); textSize(28); fill(255, 50, 50);
          text("⚠️ 隕石來襲！張手集氣！ ⚠️", width/2, 20);
      }
      else if (combo > 1) {
          textAlign(CENTER, TOP); textSize(40);
          let comboColor = combo > 5 ? color(255, 50, 50) : color(255, 150, 0);
          fill(comboColor);
          let bounce = sin(frameCount * 0.3) * (combo * 0.5);
          text(`${combo} COMBO!`, width / 2, 20 + bounce);
          noStroke(); fill(comboColor.levels[0], comboColor.levels[1], comboColor.levels[2], 150);
          rectMode(CENTER); rect(width/2, 70, map(comboTimer, 0, COMBO_TIME_LIMIT, 200, 0), 8, 4); rectMode(CORNER);
      }

      if (shieldActive) {
          fill(0, 200, 255, 150); rect(20, 130, map(shieldTimer, 0, SHIELD_DURATION, 120, 0), 10, 5);
          fill(255); textSize(12); text("SHIELD ACTIVE", 20, 115);
      }
      textAlign(CENTER, CENTER);
    }

    function createBurstParticles(px, py, pcolor, count) {
      for (let i = 0; i < count; i++) {
        let angle = random(TWO_PI); let speed = random(1, 8);
        particles.push({
          x: px, y: py, vx: cos(angle) * speed, vy: sin(angle) * speed,
          life: 255, color: pcolor, size: random(3, 10)
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 10; p.vx *= 0.95; p.vy *= 0.95;
        noStroke(); let c = color(p.color); c.setAlpha(p.life); fill(c);
        circle(p.x, p.y, p.size * (p.life/255));
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawGlitchEffect() {
      fill(255, 0, 0, 80); rect(0, 0, width, height);
      for (let i = 0; i < 8; i++) {
        fill(255, 255, 255, random(50, 200)); noStroke();
        rect(0, random(height), width, random(5, 30));
        rect(random(width), 0, random(5, 30), height); 
      }
    }

    // ==========================================
    // 成功/失敗流程與特效
    // ==========================================
    function triggerGameOver() {
        gameState = 4; screenShakeTime = 50; glitchEffectTime = 20;
        createBurstParticles(width/2, height/2, '#FF0000', 100); 
    }

    function triggerWin() {
        gameState = 5; score += 500; winParticles = [];
        for(let i=0; i<150; i++) {
            winParticles.push({
                x: width/2, y: height, vx: random(-8, 8), vy: random(-15, -5),
                color: random(['#FFD700', '#00FFFF', '#FF69B4', '#32CD32']),
                size: random(5, 12), angle: random(TWO_PI), rotSpeed: random(-0.2, 0.2)
            });
        }
    }

    function drawGameOverScreen() {
      fill(20, 0, 0, 220); rect(0, 0, width, height);
      fill(255, 50, 50); textSize(60); text("💀 MISSION FAILED 💀", width / 2, height / 2 - 60);
      fill(255, 215, 0); textSize(32); text(`FINAL SCORE: ${score}`, width / 2, height / 2 + 10);
      
      fill(0, 255, 204, map(sin(frameCount * 0.1), -1, 1, 150, 255)); textSize(20);
      text("▶ 將手掌移到此處返回選單 ◀", width / 2, height / 2 + 120);
      updateAndDrawTrail(); drawCursor(cursorX, cursorY);
      if (dist(cursorX, cursorY, width / 2, height / 2 + 120) < 50) { resetGame(); gameState = 1; changeSong(2); } // 回選單用 song3
    }

    function drawWinScreen() {
      fill(0, 20, 0, 180); rect(0, 0, width, height);
      
      for(let p of winParticles) {
          p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.angle += p.rotSpeed;
          push(); translate(p.x, p.y); rotate(p.angle);
          fill(p.color); noStroke(); rect(0, 0, p.size, p.size); pop();
      }

      fill(255, 215, 0); textSize(60); text("🏆 STAGE CLEARED 🏆", width / 2, height / 2 - 60);
      fill(0, 255, 255); textSize(32); text(`FINAL SCORE: ${score}`, width / 2, height / 2 + 10);
      
      fill(0, 255, 204, map(sin(frameCount * 0.1), -1, 1, 150, 255)); textSize(20);
      text("▶ 將手掌移到此處返回選單 ◀", width / 2, height / 2 + 120);
      
      updateAndDrawTrail(); drawCursor(cursorX, cursorY);
      if (dist(cursorX, cursorY, width / 2, height / 2 + 120) < 50) { resetGame(); gameState = 1; changeSong(2); }
    }

    function resetGame() {
      score = 0; lives = 3; level = 1; gameTimer = 0; combo = 0; comboTimer = 0;
      shieldActive = false; shieldTimer = 0; hoverMenu1 = 0; hoverMenu2 = 0;
      items = []; particles = []; cursorTrailParticles = []; winParticles = [];
      screenShakeTime = 0; glitchEffectTime = 0;
      chargeLevel = 0; bossItem = null; challengeMode = false; invincibleTimer = 0; 
    }
  </script>
</body>
</html>
